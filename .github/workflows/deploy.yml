name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual runs from GitHub Actions tab

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Build Vue.js frontend ──────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vue.js frontend
        working-directory: frontend
        run: npm run build
        # VITE_API_URL=/api is read automatically from frontend/.env.production

      # ── 3. Stage the Hostinger public_html layout ─────────────────────────
      #
      #  deploy/            → public_html/        (Vue SPA served by Apache)
      #  deploy/api/        → public_html/api/    (PHP REST API)
      #
      - name: Stage deployment layout
        run: |
          mkdir -p deploy/api

          # Vue SPA (index.html, assets/, .htaccess, images, etc.)
          cp -r frontend/dist/. deploy/

          # PHP entry point and URL rewriter
          cp backend/public/index.php  deploy/api/index.php
          cp backend/public/.htaccess  deploy/api/.htaccess

          # PHP application code, configuration, routes, and upload folders
          cp -r backend/app     deploy/api/app
          cp -r backend/config  deploy/api/config
          cp -r backend/routes  deploy/api/routes
          cp -r backend/public/uploads  deploy/api/uploads

          # backend/.env is intentionally EXCLUDED here.
          # Create it manually in Hostinger File Manager at:
          #   public_html/api/.env
          # Use backend/.env.example as a template and fill in real values.

      # ── 4. Deploy via FTPS ────────────────────────────────────────────────
      #
      # Required GitHub repository secrets (Settings → Secrets → Actions):
      #   FTP_SERVER   – your Hostinger FTP hostname, e.g. ftp.yourdomain.com
      #   FTP_USERNAME – Hostinger FTP username
      #   FTP_PASSWORD – Hostinger FTP password
      #
      # dangerous-clean-slate: false  → never deletes remote-only files;
      # this preserves user-uploaded files in api/uploads/ and the manually
      # created api/.env that holds production database credentials and secrets.
      #
      - name: Deploy to Hostinger via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./deploy/
          server-dir: public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            api/.env
