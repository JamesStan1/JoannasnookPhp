name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual runs from GitHub Actions tab

jobs:
  deploy:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Build Vue.js frontend ──────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vue.js frontend
        working-directory: frontend
        run: npm run build
        # VITE_API_URL=/api is read automatically from frontend/.env.production

      # ── 3. Stage the Hostinger public_html layout ─────────────────────────
      #
      #  deploy/            → public_html/        (Vue SPA served by Apache)
      #  deploy/api/        → public_html/api/    (PHP REST API)
      #
      - name: Stage deployment layout
        run: |
          mkdir -p deploy/api

          # Vue SPA (index.html, assets/, .htaccess, images, etc.)
          cp -r frontend/dist/. deploy/

          # PHP entry point and URL rewriter
          cp backend/public/index.php  deploy/api/index.php
          cp backend/public/.htaccess  deploy/api/.htaccess

          # PHP application code, configuration, routes, and upload folders
          cp -r backend/app     deploy/api/app
          cp -r backend/config  deploy/api/config
          cp -r backend/routes  deploy/api/routes
          cp -r backend/public/uploads  deploy/api/uploads

          # backend/.env is intentionally EXCLUDED here.
          # Create it manually in Hostinger File Manager at:
          #   public_html/api/.env
          # Use backend/.env.example as a template and fill in real values.

      # ── 4. Create .zip archive (Hostinger backup upload format) ───────────
      #
      # Hostinger's "Upload website backup files" accepts:
      #   .zip  .sql  .tar  .tar.gz  .tgz  .7z  .gz  .sql.gz
      #
      # After this job finishes:
      #   1. Go to the Actions tab → select this run → download "website-backup"
      #   2. In Hostinger hPanel → Files → Backups → Upload backup
      #   3. Upload the downloaded website-backup.zip
      #   4. Restore it to public_html/
      #
      - name: Create deployment zip
        run: |
          cd deploy
          zip -r ../website-backup.zip .
          cd ..
          echo "Archive size: $(du -sh website-backup.zip | cut -f1)"

      # ── 5. Upload artifact (downloadable from the Actions run page) ────────
      - name: Upload website-backup.zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-backup
          path: website-backup.zip
          retention-days: 7
